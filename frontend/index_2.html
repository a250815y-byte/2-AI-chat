<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Companion Chat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #0d0e15;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .phone-container {
            width: 100vw;
            height: 100vh;
            background-color: #161722;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            z-index: 1;
        }
        .screen.active {
            display: flex;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            text-align: center;
            width: 100%;
        }
        .btn-primary:active { opacity: 0.8; }

        /* --- 1. キャラクター一覧画面 --- */
        #selection-screen {
            padding: 20px;
            overflow-y: auto;
        }
        .screen-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            margin-top: 20px;
        }
        .char-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding-bottom: 40px;
        }
        .char-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .char-card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
        }
        .char-card img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .char-card h3 { font-size: 18px; margin-bottom: 4px; }
        .char-card p { font-size: 12px; color: rgba(255, 255, 255, 0.5); }

        /* --- 2. ホーム画面 --- */
        .header-bar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            background: rgba(22, 23, 34, 0.9);
            backdrop-filter: blur(10px);
            z-index: 10;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        @supports (-webkit-touch-callout: none) {
            .header-bar { padding-top: 15px; height: 75px; }
        }
        .icon-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .home-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .home-avatar-wrap {
            position: relative;
            margin-top: 10px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }
        .home-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #6366f1;
        }
        .status-dot {
            width: 16px;
            height: 16px;
            background-color: #22c55e;
            border-radius: 50%;
            position: absolute;
            bottom: 8px;
            right: 8px;
            border: 3px solid #161722;
        }
        .home-name { font-size: 26px; font-weight: bold; margin-bottom: 16px; flex-shrink: 0; }
        .home-desc {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            max-width: 90%;
            line-height: 1.6;
            margin-bottom: 20px;
            text-align: left;
            white-space: pre-wrap;
        }
        .fixed-input-area {
            padding: 16px;
            background: #161722;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: max(16px, env(safe-area-inset-bottom));
        }

        /* --- 3. チャット画面 --- */
        .chat-main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background-color: #11121a;
            -webkit-overflow-scrolling: touch;
        }
        .message-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            max-width: 85%;
            width: 100%;
        }
        .message-row.user { align-self: flex-end; justify-content: flex-end; }
        .message-row.ai { align-self: flex-start; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .msg-bubble {
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-all;
        }
        .user .msg-bubble { background-color: #6366f1; color: #fff; border-top-right-radius: 4px; }
        .ai .msg-bubble { background-color: #20222e; color: #fff; border-top-left-radius: 4px; }
        .ai .msg-bubble.loading { padding: 16px; display: flex; gap: 4px; }
        .dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: dotFlashing 1s infinite linear alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotFlashing { 0% { opacity: 0.2; } 100% { opacity: 1; } }

        .chat-input-area {
            padding: 10px;
            background-color: #161722;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        .chat-input {
            flex: 1;
            background-color: #20222e;
            border: none;
            padding: 14px 18px;
            border-radius: 24px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .send-btn {
            background: #6366f1;
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .send-btn:disabled { background: rgba(99, 102, 241, 0.3); color: rgba(255,255,255,0.3); }

        /* --- 4. 履歴ドロワー --- */
        .history-drawer {
            position: absolute;
            top: 0;
            left: -100%;
            width: 85%;
            max-width: 320px;
            height: 100%;
            background-color: #1c1d2a;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
            z-index: 100;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .history-drawer.open { left: 0; }
        .history-header {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        @supports (-webkit-touch-callout: none) {
            .history-header { padding-top: 15px; height: 75px; }
        }
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        .history-item {
            background: rgba(255,255,255,0.03);
            padding: 16px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            border: 1px solid transparent;
        }
        .history-item:active {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }
        .drawer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 99;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .drawer-overlay.show { display: block; opacity: 1; }
    </style>
</head>
<body>

    <div class="phone-container">

        <div class="drawer-overlay" id="drawer-overlay" onclick="toggleHistory(false)"></div>
        <div class="history-drawer" id="history-drawer">
            <div class="history-header">
                <h3>会話の履歴</h3>
                <button class="icon-btn" onclick="toggleHistory(false)">✕</button>
            </div>
            <div class="history-list" id="history-list-area"></div>
        </div>

        <div class="screen active" id="selection-screen">
            <div class="screen-title">キャラクター</div>
            <div class="char-grid">
                <div class="char-card" onclick="selectCharacter('つむぎ', 'images tsumugi.jpg')">
                    <img src="images tsumugi.jpg" alt="つむぎ">
                    <h3>つむぎ</h3>
                    <p>津軽弁 / 21歳</p>
                </div>
                <div class="char-card" onclick="selectCharacter('蒼空', 'images aozora.jpg')">
                    <img src="images aozora.jpg" alt="蒼空">
                    <h3>そら</h3>
                    <p>津軽弁 / 21歳</p>
                </div>
            </div>
        </div>

        <div class="screen" id="home-screen">
            <div class="header-bar">
                <button class="icon-btn" onclick="toggleHistory(true)">☰</button>
                <span style="font-weight: bold;">AI Companion</span>
                <button class="icon-btn" onclick="goBackToSelection()">↩</button>
            </div>
            <div class="home-main">
                <div class="home-avatar-wrap">
                    <img id="home-avatar-img" src="" alt="avatar" class="home-avatar">
                    <div class="status-dot"></div>
                </div>
                <div class="home-name" id="home-character-name">キャラクター名</div>
                <div class="home-desc" id="home-character-desc">紹介文がここに入ります。</div>
            </div>
            <div class="fixed-input-area">
                <button class="btn-primary" onclick="startChat()" id="start-chat-btn">トークを始める</button>
            </div>
        </div>

        <div class="screen" id="chat-screen">
            <div class="header-bar">
                <button class="icon-btn" onclick="goBackToHome()">←</button>
                <span id="chat-header-name" style="font-weight: bold;">キャラクター名</span>
                <button class="icon-btn" style="font-size: 18px;">📞</button>
            </div>
            <div class="chat-main" id="chat-messages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input-field" placeholder="メッセージを入力..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()" id="send-msg-btn">➔</button>
            </div>
        </div>

    </div>

    <script>
        const API_BASE_URL = "http://localhost:3000";
        const CURRENT_USER_ID = "79596575-e7b0-41e8-860a-f8d5bf0162c8";

        let currentCharacter = { name: '', image: '' };
        let activeConversations = { "つむぎ": null, "蒼空": null };

        const characterDescriptions = {
            "つむぎ": "誰とでもすぐ打ち解ける、人懐っこくて笑顔が絶えない女の子。\n\n困っている人を見ると放っておけず、見返りなんて考えず自然と手を差し伸べる優しさを持っている。\n明るく場を盛り上げるムードメーカーだが、ただのお調子者ではない。\n\n現実をしっかり見据え、自分が決めたことは最後までやり抜く芯の強さと覚悟を秘めている。\n普段は津軽弁で気さくに話し、初対面でも距離を縮めるのが得意。\n\nその温かな笑顔とまっすぐな人柄は、多くの人から信頼されている。",
            "蒼空": "人懐っこく、誰とでも気軽に話せる明るい青年。\n\n持ち前の笑顔と気さくな津軽弁で自然と人の輪に溶け込み、初対面の相手でも緊張させない空気を作る。\n困っている人を見れば放っておけず、見返りを求めることなく手を差し伸べるのが当たり前。\n\n周囲への気配りも細やかで、自分より相手を優先して行動することも少なくない。\nその穏やかな人柄とは裏腹に、現実をしっかり受け止める冷静さと、自分が信じた道を最後まで貫く強い覚悟を持つ。\n\n明るさと優しさ、そして揺るがない芯を兼ね備えた、誰からも信頼される青年。"
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function selectCharacter(name, imagePath) {
            currentCharacter.name = name;
            currentCharacter.image = imagePath;
            document.getElementById('home-character-name').innerText = name;
            document.getElementById('home-avatar-img').src = imagePath;
            const descText = characterDescriptions[name] || "紹介文は現在準備中です。";
            document.getElementById('home-character-desc').innerText = descText;
            switchScreen('home-screen');
        }

        async function startChat() {
            document.getElementById('chat-header-name').innerText = currentCharacter.name;
            const chatMain = document.getElementById('chat-messages');
            chatMain.innerHTML = '';

            const startBtn = document.getElementById('start-chat-btn');
            startBtn.disabled = true;
            startBtn.innerText = "接続中...";

            let conversationId = activeConversations[currentCharacter.name];

            if (!conversationId) {
                try {
                    const response = await fetch(`${API_BASE_URL}/conversations`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // ✅ 修正①: characterName → title に変更
                        body: JSON.stringify({ userId: CURRENT_USER_ID, title: currentCharacter.name })
                    });
                    const data = await response.json();

                    if (data && data.id) {
                        conversationId = data.id;
                        activeConversations[currentCharacter.name] = conversationId;
                    }
                } catch (error) {
                    console.error("会話の取得に失敗しました:", error);
                    renderMessageElement("サーバーへの接続に失敗しました。", "ai");
                    startBtn.disabled = false;
                    startBtn.innerText = "トークを始める";
                    switchScreen('chat-screen');
                    return;
                }
            }

            startBtn.disabled = false;
            startBtn.innerText = "トークを始める";

            if (conversationId) {
                try {
                    const response = await fetch(`${API_BASE_URL}/messages/${conversationId}`);
                    const messages = await response.json();

                    if (messages && messages.length > 0) {
                        messages.forEach(msg => {
                            renderMessageElement(msg.content, msg.sender);
                        });
                        scrollChatToBottom();
                    } else {
                        renderMessageElement(`こんにちは！${currentCharacter.name}だじゃ。よろしくの！✨`, 'ai');
                    }
                } catch (error) {
                    console.error("メッセージ一覧の取得に失敗しました:", error);
                    renderMessageElement("履歴の取得に失敗しました。", "ai");
                }
            }

            switchScreen('chat-screen');
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input-field');
            const text = input.value.trim();
            if (!text) return;

            const conversationId = activeConversations[currentCharacter.name];
            if (!conversationId) return;

            const sendBtn = document.getElementById('send-msg-btn');

            renderMessageElement(text, 'user');
            input.value = '';
            sendBtn.disabled = true;
            input.disabled = true;
            scrollChatToBottom();

            const loadingBubble = addLoadingBubble();

            try {
                // ✅ 修正②: POST /messages の2重送信を削除。
                //    /ai エンドポイントが内部でDBに保存するので、ここでは呼ばない。
                const aiResponse = await fetch(`${API_BASE_URL}/ai`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        conversationId: conversationId,
                        userMessage: text
                    })
                });

                removeLoadingBubble(loadingBubble);

                if (!aiResponse.ok) throw new Error("AIサーバーエラー");

                const aiData = await aiResponse.json();
                renderMessageElement(aiData.reply, 'ai');

            } catch (error) {
                console.error("通信エラーが発生しました:", error);
                removeLoadingBubble(loadingBubble);
                renderMessageElement("ごめん、うまく聞き取れんかったじゃ…", 'ai');
            } finally {
                sendBtn.disabled = false;
                input.disabled = false;
                input.focus();
                scrollChatToBottom();
            }
        }

        async function toggleHistory(open) {
            const drawer = document.getElementById('history-drawer');
            const overlay = document.getElementById('drawer-overlay');
            const listArea = document.getElementById('history-list-area');

            if (open) {
                drawer.classList.add('open');
                overlay.classList.add('show');
                listArea.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);font-size:14px;">読み込み中...</p>';

                try {
                    const response = await fetch(`${API_BASE_URL}/conversations/${CURRENT_USER_ID}`);
                    const conversations = await response.json();
                    listArea.innerHTML = '';

                    if (conversations && conversations.length > 0) {
                        conversations.forEach(conv => {
                            const item = document.createElement('div');
                            item.classList.add('history-item');
                            item.innerText = `${conv.title} との会話`;
                            item.onclick = () => {
                                toggleHistory(false);
                                const imgPath = conv.title === 'つむぎ' ? 'images tsumugi.jpg' : 'images aozora.jpg';
                                selectCharacter(conv.title, imgPath);
                                activeConversations[conv.title] = conv.id;
                                startChat();
                            };
                            listArea.appendChild(item);
                        });
                    } else {
                        listArea.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);font-size:14px;">まだ履歴はありません。</p>';
                    }
                } catch (error) {
                    console.error("会話一覧の取得に失敗しました:", error);
                    listArea.innerHTML = '<p style="text-align:center;color:#ef4444;font-size:14px;">履歴の取得に失敗しました。</p>';
                }
            } else {
                drawer.classList.remove('open');
                overlay.classList.remove('show');
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function renderMessageElement(content, sender) {
            const chatMain = document.getElementById('chat-messages');
            const row = document.createElement('div');
            row.classList.add('message-row', sender);

            if (sender === 'ai') {
                const img = document.createElement('img');
                img.classList.add('msg-avatar');
                img.src = currentCharacter.image;
                img.onerror = () => img.src = "https://via.placeholder.com/36/161722/FFFFFF?text=AI";
                row.appendChild(img);
            }

            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            bubble.innerText = content;
            row.appendChild(bubble);

            chatMain.appendChild(row);
        }

        function addLoadingBubble() {
            const chatMain = document.getElementById('chat-messages');
            const row = document.createElement('div');
            row.classList.add('message-row', 'ai');

            const img = document.createElement('img');
            img.classList.add('msg-avatar');
            img.src = currentCharacter.image;
            row.appendChild(img);

            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble', 'loading');
            bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            row.appendChild(bubble);

            chatMain.appendChild(row);
            scrollChatToBottom();
            return row;
        }

        function removeLoadingBubble(loadingRow) {
            if (loadingRow && loadingRow.parentNode) {
                loadingRow.parentNode.removeChild(loadingRow);
            }
        }

        function scrollChatToBottom() {
            const chatMain = document.getElementById('chat-messages');
            chatMain.scrollTop = chatMain.scrollHeight;
        }

        function goBackToSelection() { switchScreen('selection-screen'); }
        function goBackToHome() { switchScreen('home-screen'); }
    </script>
</body>
</html>
